<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f4f4f4;
    font-family:Arial,sans-serif;
}

.calculator{
    background:#222;
    padding:20px;
    border-radius:10px;
    width:300px;
}

#display{
    width:100%;
    height:60px;
    font-size:24px;
    text-align:right;
    margin-bottom:10px;
    border:none;
    padding:10px;
    border-radius:5px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    padding:15px;
    font-size:20px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    opacity:0.8;
}

.operator{
    background:orange;
    color:white;
}

.equal{
    background:green;
    color:white;
}

.clear{
    background:red;
    color:white;
}
